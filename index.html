<!DOCTYPE html>
<html lang="en">
<head>
  <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="coustom.css">
</head>
<body>
    <div class="container pt-4">
      <div class="row mt-4 ">
        <div class="col-3"></div>
        <div class="col-6 bg-dark text-center p-4 ">
            <input type="text" class="mb-4 bg-dark border border-light text-light  text-end " readonly id="data" placeholder="0">

            <table>
              <tr>
                <td> <button type="button" onclick="ac()" class="btn btn-danger">AC</button></td>
                <td> <button type="button" onclick="lclr()"class="btn btn-danger">C</button></td>
                <td> <button type="button" onclick="num('%')" class="btn btn-danger">%</button></td>
                <td> <button type="button" onclick="num('+')" class="btn btn-danger">+</button></td>
              </tr>
              <tr>
                <td> <button type="button" onclick="num(7)" class="btn btn-secondary">7</button></td>
                <td> <button type="button" onclick="num(8)" class="btn btn-secondary">8</button></td>
                <td> <button type="button" onclick="num(9)" class="btn btn-secondary">9</button></td>
                <td> <button type="button" onclick="num('-')"class="btn btn-danger">-</button></td>
              </tr>
              <tr>
                <td> <button type="button" class="btn btn-secondary" onclick="num(4)">4</button></td>
                <td> <button type="button" class="btn btn-secondary" onclick="num(5)">5</button></td>
                <td> <button type="button" class="btn btn-secondary" onclick="num(6)">6</button></td>
                <td> <button type="button" class="btn btn-danger" onclick="num('*')">x</button></td>
              </tr>
              <tr>
                <td> <button type="button" class="btn btn-secondary" onclick="num(1)">1</button></td>
                <td> <button type="button" class="btn btn-secondary" onclick="num(2)">2</button></td>
                <td> <button type="button" class="btn btn-secondary" onclick="num(3)">3</button></td>
                <td> <button type="button" class="btn btn-danger"   onclick="num('/')">/</button></td>
              </tr>
              <tr>
                <td colspan="2"> <button type="button" class="btn btn-secondary" onclick="num(0)">0</button></td>
                <td> <button type="button" class="btn btn-secondary" onclick="num('.')">.</button></td>
                <td> <button type="button" class="btn btn-danger" onclick="ans()">=</button></td>
              </tr>
            </table>


        </div>
        <div class="col-3"></div>
      </div>
    </div>
    <script src="index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>  
</body>
</html>
